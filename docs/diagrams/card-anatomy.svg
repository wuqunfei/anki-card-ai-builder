<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <filter id="cardshadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000025"/>
    </filter>
    <filter id="lightshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#f1f5f9" rx="16"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">ankids Card Anatomy</text>

  <!-- ── FRONT CARD ────────────────────────────────────────── -->
  <rect x="32" y="58" width="376" height="430" rx="16" fill="white" filter="url(#cardshadow)"/>

  <!-- FRONT label -->
  <rect x="32" y="58" width="376" height="36" rx="16" fill="#2c3e50"/>
  <rect x="32" y="76" width="376" height="18" fill="#2c3e50"/>
  <text x="220" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5">FRONT</text>

  <!-- Target word -->
  <text x="220" y="134" text-anchor="middle" font-size="30" font-weight="700" fill="#2980b9">incroyable</text>

  <!-- IPA + POS -->
  <text x="220" y="158" text-anchor="middle" font-size="13" fill="#7f8c8d">/ɛ̃kʁwajabl/</text>
  <rect x="186" y="166" width="68" height="18" rx="9" fill="#f0f4f8"/>
  <text x="220" y="179" text-anchor="middle" font-size="10.5" fill="#64748b">adjective</text>

  <!-- Image placeholder -->
  <rect x="80" y="196" width="280" height="180" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="220" y="278" text-anchor="middle" font-size="38">🤩</text>
  <text x="220" y="308" text-anchor="middle" font-size="11" fill="#93c5fd">AI-generated cartoon image</text>
  <text x="220" y="322" text-anchor="middle" font-size="10" fill="#bfdbfe">(MiniMax image-01)</text>

  <!-- Audio button -->
  <rect x="166" y="392" width="108" height="36" rx="18" fill="#2980b9" filter="url(#lightshadow)"/>
  <text x="220" y="415" text-anchor="middle" font-size="13" fill="white">🔊 Listen</text>

  <!-- Front footer note -->
  <text x="220" y="462" text-anchor="middle" font-size="10" fill="#94a3b8">Tap to hear the word · Think of the translation</text>
  <text x="220" y="476" text-anchor="middle" font-size="10" fill="#94a3b8">Then flip ↓</text>

  <!-- ── BACK CARD ────────────────────────────────────────── -->
  <rect x="452" y="58" width="376" height="430" rx="16" fill="white" filter="url(#cardshadow)"/>

  <!-- BACK label -->
  <rect x="452" y="58" width="376" height="36" rx="16" fill="#2c3e50"/>
  <rect x="452" y="76" width="376" height="18" fill="#2c3e50"/>
  <text x="640" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5">BACK (ANSWER)</text>

  <!-- Target word repeated -->
  <text x="640" y="128" text-anchor="middle" font-size="24" font-weight="700" fill="#2980b9">incroyable</text>
  <text x="640" y="147" text-anchor="middle" font-size="11.5" fill="#7f8c8d">/ɛ̃kʁwajabl/  ·  adjective</text>

  <!-- Divider -->
  <line x1="476" y1="158" x2="804" y2="158" stroke="#e2e8f0" stroke-width="1"/>

  <!-- MORPHEME BREAKDOWN -->
  <rect x="472" y="164" width="4" height="22" rx="2" fill="#5b9bd5"/>
  <text x="486" y="179" font-size="11" fill="#64748b" font-weight="500">Morphemes: </text>
  <text x="568" y="179" font-size="13" font-weight="700" fill="#5b9bd5">in-</text>
  <text x="588" y="179" font-size="11" fill="#94a3b8"> + </text>
  <text x="600" y="179" font-size="13" font-weight="700" fill="#e07b7b">croy</text>
  <text x="625" y="179" font-size="11" fill="#94a3b8"> + </text>
  <text x="637" y="179" font-size="13" font-weight="700" fill="#6dba6d">-able</text>

  <!-- MEMORY HOOK -->
  <rect x="472" y="190" width="4" height="22" rx="2" fill="#9b59b6"/>
  <text x="486" y="205" font-size="11" fill="#64748b" font-weight="500">Hook: </text>
  <text x="527" y="205" font-size="11" fill="#5b9bd5" font-weight="600">in-</text>
  <text x="544" y="205" font-size="11" fill="#64748b">=not, </text>
  <text x="577" y="205" font-size="11" fill="#e07b7b" font-weight="600">croy</text>
  <text x="600" y="205" font-size="11" fill="#64748b">=believe, </text>
  <text x="651" y="205" font-size="11" fill="#6dba6d" font-weight="600">-able</text>
  <text x="676" y="205" font-size="11" fill="#64748b">=can be</text>

  <!-- ORIGIN CHAIN -->
  <rect x="472" y="216" width="4" height="22" rx="2" fill="#D4A854"/>
  <text x="486" y="231" font-size="11" fill="#64748b" font-weight="500">Origin: </text>
  <text x="530" y="231" font-size="11" fill="#8B6914" font-weight="600">PIE *krey-</text>
  <text x="596" y="231" font-size="11" fill="#94a3b8"> → </text>
  <text x="614" y="231" font-size="11" fill="#B8860B" font-weight="600">Latin credere</text>
  <text x="692" y="231" font-size="11" fill="#94a3b8"> → </text>
  <text x="710" y="231" font-size="11" fill="#D4A854" font-weight="600">Old French</text>

  <!-- COGNATES -->
  <rect x="472" y="242" width="4" height="22" rx="2" fill="#8e7cc3"/>
  <text x="486" y="257" font-size="11" fill="#64748b" font-weight="500">Cognates: </text>
  <text x="547" y="257" font-size="11" fill="#8e7cc3" font-weight="700">EN </text>
  <text x="564" y="257" font-size="11" fill="#475569" font-style="italic">incredible</text>
  <text x="620" y="257" font-size="11" fill="#94a3b8"> · </text>
  <text x="630" y="257" font-size="11" fill="#a78bfa" font-weight="700">DE </text>
  <text x="648" y="257" font-size="11" fill="#475569" font-style="italic">unglaublich</text>
  <text x="714" y="257" font-size="11" fill="#94a3b8"> · </text>
  <text x="724" y="257" font-size="11" fill="#7c3aed" font-weight="700">LA </text>
  <text x="742" y="257" font-size="11" fill="#475569" font-style="italic">incredibilis</text>

  <!-- Divider 2 -->
  <line x1="476" y1="272" x2="804" y2="272" stroke="#e2e8f0" stroke-width="1"/>

  <!-- EXAMPLE SENTENCE (FR) -->
  <text x="640" y="293" text-anchor="middle" font-size="13.5" fill="#4a90d9">C'est incroyable! 🤩✨</text>
  <text x="640" y="312" text-anchor="middle" font-size="11" fill="#7ea87e">Das ist unglaublich! 😲</text>

  <!-- Audio for example -->
  <rect x="580" y="322" width="120" height="26" rx="13" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="640" y="339" text-anchor="middle" font-size="10.5" fill="#0284c7">🔊 Play example</text>

  <!-- Divider 3 -->
  <line x1="476" y1="358" x2="804" y2="358" stroke="#e2e8f0" stroke-width="1"/>

  <!-- SOURCE WORD (German) -->
  <text x="514" y="378" font-size="11" fill="#94a3b8">Source word (DE):</text>
  <text x="640" y="378" font-size="13" font-weight="600" fill="#475569">unglaublich</text>

  <!-- GENDER badge placeholder for gendered nouns -->
  <rect x="472" y="390" width="356" height="34" rx="8" fill="#f8fafc"/>
  <text x="650" y="409" text-anchor="middle" font-size="10" fill="#94a3b8">💡 For nouns: </text>
  <rect x="715" y="395" width="22" height="16" rx="4" fill="#dbeafe"/>
  <text x="726" y="407" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="700">m.</text>
  <text x="742" y="409" font-size="10" fill="#94a3b8"> / </text>
  <rect x="748" y="395" width="18" height="16" rx="4" fill="#fee2e2"/>
  <text x="757" y="407" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="700">f.</text>
  <text x="770" y="409" font-size="10" fill="#94a3b8"> colored</text>

  <!-- Color legend strip -->
  <rect x="472" y="436" width="356" height="36" rx="8" fill="#f1f5f9"/>
  <text x="486" y="449" font-size="9" fill="#64748b" font-weight="600">Color legend:</text>
  <rect x="556" y="437" width="10" height="10" rx="2" fill="#5b9bd5"/>
  <text x="570" y="447" font-size="9" fill="#475569">prefix</text>
  <rect x="614" y="437" width="10" height="10" rx="2" fill="#e07b7b"/>
  <text x="628" y="447" font-size="9" fill="#475569">root</text>
  <rect x="664" y="437" width="10" height="10" rx="2" fill="#6dba6d"/>
  <text x="678" y="447" font-size="9" fill="#475569">suffix</text>
  <rect x="720" y="437" width="10" height="10" rx="2" fill="#D4A854"/>
  <text x="734" y="447" font-size="9" fill="#475569">origin</text>
  <rect x="772" y="437" width="10" height="10" rx="2" fill="#8e7cc3"/>
  <text x="786" y="447" font-size="9" fill="#475569">cognate</text>

  <text x="486" y="464" font-size="9" fill="#94a3b8" font-style="italic">Same colors used consistently across morpheme, hook, and origin fields</text>

  <!-- Arrow between cards -->
  <text x="430" y="280" text-anchor="middle" font-size="22" fill="#94a3b8">→</text>
  <text x="430" y="296" text-anchor="middle" font-size="9" fill="#94a3b8">flip</text>
</svg>
