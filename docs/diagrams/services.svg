  <!-- Title -->
  <text x="410" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">External API Services</text>

  <!-- ── ankids (center) ── -->
  <rect x="310" y="148" width="200" height="84" rx="14" fill="#1e293b" filter="url(#boxshadow)"/>
  <text x="410" y="180" text-anchor="middle" font-size="11" fill="#94a3b8" letter-spacing="1">CLI TOOL</text>
