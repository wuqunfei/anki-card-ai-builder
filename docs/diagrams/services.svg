  <text x="410" y="289" text-anchor="middle" font-size="10" fill="#713f12" font-weight="600">↕ Provider Fallback</text>
  <text x="410" y="304" text-anchor="middle" font-size="9.5" fill="#854d0e">MiniMax (primary) → Gemini (fallback)</text>
