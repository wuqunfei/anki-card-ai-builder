<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="g-fri" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="g-sat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="bs">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="cs">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="720" height="440" rx="16" fill="#f8fafc"/>
  <rect x="1" y="1" width="718" height="438" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="17" font-weight="800" fill="#1e293b">Weekend Coding Sprint</text>
  <text x="360" y="54" text-anchor="middle" font-size="11" fill="#94a3b8">118 commits total · Mon Apr 20 &amp; Thu Apr 23 distributed proportionally across sprint days</text>

  <!-- Chart area: left=85, top=72, width=550, height=240, baseline=312 -->
  <!-- scale = 240/70 ≈ 3.428 px per commit -->

  <!-- Gridlines: 0=312, 15=261, 30=209, 45=158, 60=106 -->
  <line x1="85" y1="312" x2="635" y2="312" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="85" y1="261" x2="635" y2="261" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="85" y1="209" x2="635" y2="209" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="85" y1="158" x2="635" y2="158" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="85" y1="106" x2="635" y2="106" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Y-axis labels -->
  <text x="76" y="316" text-anchor="end" font-size="11" fill="#94a3b8">0</text>
  <text x="76" y="265" text-anchor="end" font-size="11" fill="#94a3b8">15</text>
  <text x="76" y="213" text-anchor="end" font-size="11" fill="#94a3b8">30</text>
  <text x="76" y="162" text-anchor="end" font-size="11" fill="#94a3b8">45</text>
  <text x="76" y="110" text-anchor="end" font-size="11" fill="#94a3b8">60</text>

  <!-- Y-axis line -->
  <line x1="85" y1="72" x2="85" y2="312" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Bars: 3 bars, width=140px, gap=65px, start=110 -->
  <!-- Centers: 180, 385, 590 -->
  <!-- Bar heights (scale=240/70=3.428): Fri 63→216, Sat 53→182, Sun 2→7 -->
  <!-- y_tops: Fri 96, Sat 130, Sun 305 -->

  <!-- ── FRI Apr 24: 63 commits ── -->
  <rect x="110" y="96" width="140" height="216" rx="10" fill="url(#g-fri)" filter="url(#bs)"/>
  <!-- Highlight stripe at top -->
  <rect x="110" y="96" width="140" height="22" rx="10" fill="white" opacity="0.18"/>
  <!-- Count badge -->
  <rect x="150" y="75" width="60" height="26" rx="13" fill="#db2777" filter="url(#cs)"/>
  <text x="180" y="93" text-anchor="middle" font-size="13" font-weight="800" fill="white">63</text>

  <!-- Overnight annotation -->
  <line x1="247" y1="160" x2="295" y2="112" stroke="#be185d" stroke-width="1.3" stroke-dasharray="4,2"/>
  <rect x="297" y="94" width="158" height="42" rx="8" fill="white" stroke="#fbcfe8" stroke-width="1.5" filter="url(#cs)"/>
  <text x="376" y="112" text-anchor="middle" font-size="10.5" font-weight="600" fill="#9d174d">🌙 01:00 – 03:19 am</text>
  <text x="376" y="127" text-anchor="middle" font-size="10" fill="#be185d">14 commits overnight</text>

  <!-- ── SAT Apr 25: 53 commits ── -->
  <rect x="315" y="130" width="140" height="182" rx="10" fill="url(#g-sat)" filter="url(#bs)"/>
  <rect x="315" y="130" width="140" height="22" rx="10" fill="white" opacity="0.18"/>
  <!-- Count badge -->
  <rect x="355" y="109" width="60" height="26" rx="13" fill="#059669" filter="url(#cs)"/>
  <text x="385" y="127" text-anchor="middle" font-size="13" font-weight="800" fill="white">53</text>

  <!-- ── SUN Apr 26: 2 commits ── -->
  <rect x="520" y="305" width="140" height="7" rx="4" fill="url(#g-sun)" filter="url(#bs)"/>
  <!-- Count badge -->
  <rect x="560" y="283" width="40" height="22" rx="11" fill="#94a3b8" filter="url(#cs)"/>
  <text x="580" y="298" text-anchor="middle" font-size="12" font-weight="800" fill="white">2</text>
  <!-- "Shipped" label -->
  <text x="590" y="274" text-anchor="middle" font-size="10" fill="#64748b">Shipped ✓</text>

  <!-- X-axis labels -->
  <!-- FRI -->
  <text x="180" y="333" text-anchor="middle" font-size="13" font-weight="700" fill="#db2777">Fri Apr 24</text>
  <text x="180" y="349" text-anchor="middle" font-size="10" fill="#be185d">Sprint kicks off 🚀</text>
  <!-- Breakdown chips -->
  <rect x="153" y="358" width="54" height="17" rx="8" fill="#fce7f3"/>
  <text x="180" y="370" text-anchor="middle" font-size="9" fill="#9d174d">32 commits</text>

  <!-- SAT -->
  <text x="385" y="333" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Sat Apr 25</text>
  <text x="385" y="349" text-anchor="middle" font-size="10" fill="#047857">Refine &amp; clean up</text>
  <!-- Breakdown chips -->
  <rect x="358" y="358" width="54" height="17" rx="8" fill="#d1fae5"/>
  <text x="385" y="370" text-anchor="middle" font-size="9" fill="#065f46">27 commits</text>

  <!-- SUN -->
  <text x="590" y="333" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">Sun Apr 26</text>
  <text x="590" y="349" text-anchor="middle" font-size="10" fill="#94a3b8">MVP delivered</text>
  <rect x="563" y="358" width="54" height="17" rx="8" fill="#f1f5f9"/>
  <text x="590" y="370" text-anchor="middle" font-size="9" fill="#94a3b8">2 commits</text>

  <!-- Footer note -->
  <rect x="85" y="392" width="550" height="30" rx="8" fill="#f1f5f9"/>
  <text x="360" y="409" text-anchor="middle" font-size="10" fill="#64748b">
    Mon Apr 20 (43 design-spec commits) + Thu Apr 23 (15 feature commits) redistributed proportionally · 118 total sprint commits
  </text>

  <!-- Y-axis title -->
  <text x="20" y="195" text-anchor="middle" font-size="11" fill="#94a3b8" transform="rotate(-90,20,195)">Commits</text>
</svg>
