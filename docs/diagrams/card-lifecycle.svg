  <text x="165" y="114" text-anchor="middle" font-size="10" fill="#475569">fields empty</text>

  <!-- Label: Ingest -->
  <text x="78" y="88" text-anchor="middle" font-size="9" fill="#5b9bd5" font-style="italic">Ingest</text>

