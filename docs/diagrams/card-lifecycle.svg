  <!-- Skip path: extracted → complete (dashed, via bottom) -->
  <path d="M165 122 Q165 150 337 150 Q509 150 509 122" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a2skip)"/>
  <rect x="278" y="142" width="126" height="16" rx="6" fill="#f8fafc"/>
  <text x="341" y="153" text-anchor="middle" font-size="9" fill="#94a3b8">--no-images / --no-audio</text>
