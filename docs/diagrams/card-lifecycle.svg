  <rect width="760" height="180" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#475569" letter-spacing="0.3">Card Lifecycle</text>

  <!-- START dot -->
