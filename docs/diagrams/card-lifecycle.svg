  <!-- ① extracted -->
  <rect x="100" y="68" width="130" height="54" rx="10" fill="white" stroke="#5b9bd5" stroke-width="2" filter="url(#s2)"/>
  <rect x="100" y="68" width="130" height="20" rx="10" fill="#5b9bd5"/>
  <rect x="100" y="78" width="130" height="10" fill="#5b9bd5"/>
  <text x="165" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="white" letter-spacing="0.5">EXTRACTED</text>
